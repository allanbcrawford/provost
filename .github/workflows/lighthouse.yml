name: Lighthouse CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm -C apps/web build
        env:
          # Provide stub env vars so the build succeeds in CI without real secrets.
          # Lighthouse audits unauthenticated pages only; no real Convex/Clerk
          # calls are made during the static build.
          NEXT_PUBLIC_CONVEX_URL: "https://stub.convex.cloud"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_stub"
          CLERK_SECRET_KEY: "sk_test_stub"

      - name: Start preview server
        run: pnpm -C apps/web start &
        env:
          NEXT_PUBLIC_CONVEX_URL: "https://stub.convex.cloud"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_stub"
          PORT: 3000

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: apps/web/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: false
