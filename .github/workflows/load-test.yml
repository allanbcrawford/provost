name: Load Tests

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Staging base URL (no trailing slash)"
        required: true
        default: "https://staging.provost.app"
      api_token:
        description: "Bearer token for authenticated requests"
        required: false
        default: ""
      script:
        description: "Which script to run"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - k6-chat
          - k6-graph

jobs:
  load-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] \
            https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y k6

      - name: Run chat load test
        if: inputs.script == 'both' || inputs.script == 'k6-chat'
        run: |
          k6 run \
            -e BASE_URL="${{ inputs.base_url }}" \
            -e API_TOKEN="${{ inputs.api_token }}" \
            scripts/load/k6-chat.js

      - name: Run graph load test
        if: inputs.script == 'both' || inputs.script == 'k6-graph'
        run: |
          k6 run \
            -e BASE_URL="${{ inputs.base_url }}" \
            -e API_TOKEN="${{ inputs.api_token }}" \
            scripts/load/k6-graph.js

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results-${{ github.run_id }}
          path: |
            k6-*.json
          retention-days: 14
          if-no-files-found: ignore
